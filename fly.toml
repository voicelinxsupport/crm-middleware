# fly.toml
# "crm-middleware" yerine kendi uygulama adını yaz
# fly launch komutu bunu otomatik doldurur

app = "crm-middleware"
primary_region = "ams"  # Amsterdam — Türkiye'ye en yakın Fly bölgesi

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DB_PATH = "/data/middleware.db"

# HTTP servisi
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # ÖNEMLİ: uyutma — sürekli online kalır
  auto_start_machines = true
  min_machines_running = 1     # her zaman en az 1 makine çalışır

# Makine kaynakları (ücretsiz tier için yeterli)
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# SQLite için kalıcı disk
[mounts]
  source = "middleware_data"
  destination = "/data"
  initial_size = "1gb"
